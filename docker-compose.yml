name: alejandria

services:
  alejandria:
    # Calibre's official CLI is published as x86_64 only. On Apple Silicon
    # Macs, Docker Desktop transparently emulates this under QEMU — it works
    # but the first build is 2-3x slower. Pinning the platform here makes
    # the behavior explicit and prevents "works on my machine" surprises
    # when collaborators share docker-compose.yml.
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: alejandria:latest
    container_name: alejandria
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ALEJANDRIA_PORT:-8080}:8080"
    # Bind-mount the host directories so books, metadata, and SQLite live
    # where the README says they do (`./library/` and `./config/`). Earlier
    # versions used named volumes, which stranded user data outside the
    # repo. If `./library` or `./config` don't exist, Docker creates them
    # and the entrypoint's `chown -R` fixes ownership.
    volumes:
      - ./library:/library
      - ./config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    # Resource caps: 2 GB RSS is enough for FastAPI + 2 concurrent
    # ebook-convert processes + the scraper's Playwright browser. Power
    # users with a 10k-book library should bump `mem_limit` to 4g.
    mem_limit: 2g
    cpus: '2.0'
    pids_limit: 512
    # Drop all capabilities, then add back only what gosu + chown need.
    # `no-new-privileges` prevents setuid binaries from regaining caps.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    # Log rotation: keep 5 x 20 MB = 100 MB max per service.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      # Readiness probe — distinguishes "alive" from "fully working".
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.alejandria.version=0.1.0"
      - "com.alejandria.description=Self-hosted ebook library"
