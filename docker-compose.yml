name: alejandria

services:
  alejandria:
    # Calibre's official CLI is published as x86_64 only. On Apple Silicon
    # Macs, Docker Desktop transparently emulates this under QEMU — it works
    # but the first build is 2-3x slower. Pinning the platform here makes
    # the behavior explicit and prevents "works on my machine" surprises
    # when collaborators share docker-compose.yml.
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: alejandria:latest
    container_name: alejandria
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ALEJANDRIA_PORT:-8080}:8080"
    # Bind-mount the host directories so books, metadata, and SQLite live
    # where the README says they do (`./library/` and `./config/`). Earlier
    # versions used named volumes, which stranded user data outside the
    # repo. If `./library` or `./config` don't exist, Docker creates them
    # and the entrypoint's `chown -R` fixes ownership.
    volumes:
      - ./library:/library
      - ./config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.alejandria.version=0.1.0"
      - "com.alejandria.description=Self-hosted ebook library"
