name: alejandria-dev

services:
  alejandria-dev:
    # Same x86_64 pin as production — see docker-compose.yml for the
    # Apple Silicon rationale.
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: alejandria:dev
    container_name: alejandria-dev
    env_file:
      - .env
    ports:
      - "${ALEJANDRIA_PORT:-8080}:8080"
    # Bind mounts match the production compose so `./library` and
    # `./config` are the single source of truth in both modes. The three
    # source mounts beneath let Vite and uvicorn hot-reload on save.
    volumes:
      - ./library:/library
      - ./config:/config
      - ./backend/src:/app/backend/src:rw
      - ./frontend/src:/app/frontend/src:rw
      - ./frontend/static:/app/frontend/static:rw
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - DEV_MODE=true
    # Looser dev limits — Vite HMR + uvicorn reload can spike CPU on first start.
    mem_limit: 1g
    cpus: '2.0'
    pids_limit: 512
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
