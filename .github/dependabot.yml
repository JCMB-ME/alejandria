version: 2

updates:
  # Python deps via uv (backend/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    # Group minor + patch updates into one PR to keep volume down.
    groups:
      python-minor:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # JS deps (frontend/package.json)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-minor:
        update-types: ["minor", "patch"]
      npm-major:
        update-types: ["major"]
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
