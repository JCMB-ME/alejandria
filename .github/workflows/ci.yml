name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen || uv sync

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check src/alejandria

      - name: Type-check (mypy)
        working-directory: backend
        run: uv run mypy src/alejandria

      - name: Test (pytest)
        working-directory: backend
        env:
          ALEJANDRIA_ALLOW_INSECURE_DEFAULTS: "true"
          ALEJANDRIA_SECRET_KEY: "ci-only-secret-key-not-used-for-real-auth-32chars"
          ALEJANDRIA_ADMIN_PASSWORD: "ciadmin"
          ALEJANDRIA_DB_PATH: /tmp/ci-alejandria.db
          ALEJANDRIA_LIBRARY_PATH: /tmp/ci-library
          ALEJANDRIA_CONFIG_PATH: /tmp/ci-config
          ALEJANDRIA_DEV_MODE: "true"
        run: uv run pytest -v

  test-frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Type-check + Svelte-check
        working-directory: frontend
        run: npm run check

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Test (vitest)
        working-directory: frontend
        run: npm test

  build-image:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compose hardening smoke check
        # Phase B ships scripts/test_compose_hardening.py. The
        # `continue-on-error` keeps CI green if the script is missing
        # during a half-shipped release; remove once Phase B is in.
        continue-on-error: true
        run: python scripts/test_compose_hardening.py

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: alejandria:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
